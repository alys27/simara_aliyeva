  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
  - SETUP_GUIDE.md
  - PROJECT_SUMMARY.md
  - JEKYLL_SETUP.md
  - .gitignore

# Collections
collections:
  projects:
    output: true

# Defaults
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
